proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=book_cache:10m;

    upstream backend {
        server server1:3000;
        server server2:3000;
        server server3:3000;
    }


    server {
     listen 80;

     location / {
        proxy_pass http://front-end:9080/;
        proxy_cache book_cache;
        proxy_cache_valid 200 10m;
    }

    location = /api/books/ {
        proxy_pass http://backend/books/;
        proxy_cache book_cache;
        proxy_cache_valid 200 10m;
    }

    location /api/books/ {
        proxy_pass http://backend/books/;
        proxy_cache book_cache;
        proxy_cache_valid 200 10m;
    }
    
    location /api/ {
         proxy_pass http://backend/;
    }

    }
