name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: listings-api

      - name: Generate tsoa routes + OpenAPI client
        run: |
          npx tsoa spec-and-routes
          ./generate-openapi.sh
          npx prettier . --write
        working-directory: listings-api

      - name: Run unit tests
        run: npm run test:unit
        working-directory: listings-api
        env:
          MONGOMS_DOWNLOAD_DIR: ${{ runner.temp }}/mongodb-binaries

      - name: Run api tests
        run: npm run test:api
        working-directory: listings-api
        env:
          MONGOMS_DOWNLOAD_DIR: ${{ runner.temp }}/mongodb-binaries

      - name: Lint
        run: npm run lint
        working-directory: listings-api

      - name: Typecheck
        run: npm run typecheck
        working-directory: listings-api

      - name: Format files (after generation)
        run: npx prettier . --write
        working-directory: listings-api

      - name: Format check
        run: npm run fmt:check
        working-directory: listings-api

  docker:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push listings-api
        uses: docker/build-push-action@v5
        with:
          context: ./listings-api
          push: true
          tags: ghcr.io/mgdiprc/listings-api:latest

      - name: Build and push orders-api
        uses: docker/build-push-action@v5
        with:
          context: ./orders-api
          push: true
          tags: ghcr.io/mgdiprc/orders-api:latest

      - name: Build and push warehouse-api
        uses: docker/build-push-action@v5
        with:
          context: ./warehouse-api
          push: true
          tags: ghcr.io/mgdiprc/warehouse-api:latest

      - name: Build and push docs-api
        uses: docker/build-push-action@v5
        with:
          context: ./docs-api
          push: true
          tags: ghcr.io/mgdiprc/docs-api:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/mgdiprc/frontend:latest