services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - front-end
      - server1
      - server2
      - server3

  front-end:
    image: ghcr.io/mcmastercce/bvd-103-mcmasterful-books/mcmasterful-books-docker:main
    volumes:
      - ./adapter:/source/adapter

  server1:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: npx -y tsx ./index.ts
    environment:
      MONGODB_URI: mongodb://mongo:27017
    depends_on:
      - mongo

  server2:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: npx -y tsx ./index.ts
    environment:
      MONGODB_URI: mongodb://mongo:27017
    depends_on:
      - mongo

  server3:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: npx -y tsx ./index.ts
    environment:
      MONGODB_URI: mongodb://mongo:27017
    depends_on:
      - mongo

  mongo:
    image: mongo:7
